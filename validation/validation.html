<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="validation.css">
    
    <script defer src="validation.js"></script>
</head>
<body>

    <div class="container">
        <div id="form">
            <h1>Create a teacher!!!</h1>

            <div class="input-control">
                <label for="TeacherCode">TeacherCode</label>
                <input id="TeacherCode" name="TeacherCode" type="text" placeholder="Enter code">
                <div class="error"></div>
            </div>

            <div class="input-control">
                <label for="FullName">FullName</label>
                <input id="FullName" name="FullName" type="text" placeholder="Enter full name">
                <div class="error"></div>
            </div>

            <div class="input-control">
                <label for="Contact">Contact</label>
                <input id="Contact" name="Contact" type="text" placeholder="Enter contact info">
                <div class="error"></div>
            </div>

            <button type="button" id="BtCreate">Create</button>

            <div id="Msg" class="text-center">Warning! Invalid input(s).</div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnCreate = document.getElementById('BtCreate');
            const msg = document.getElementById('Msg');
            
            // Get all input elements
            const inputs = {
                code: document.getElementById('TeacherCode'),
                name: document.getElementById('FullName'),
                contact: document.getElementById('Contact')
            };

            btnCreate.addEventListener('click', () => {
                // Logic: Check if any value is empty (after removing spaces)
                let isInvalid = false;

                if (inputs.code.value.trim() === "" || 
                    inputs.name.value.trim() === "" || 
                    inputs.contact.value.trim() === "") {
                    isInvalid = true;
                }

                if (isInvalid) {
                    msg.innerText = "Warning! Invalid input(s).";
                    msg.style.color = "red";
                    msg.style.display = "block";
                } else {
                    msg.innerText = "Success! Teacher profile created.";
                    msg.style.color = "green";
                    msg.style.display = "block";
                    
                    // Optional: Clear fields after success
                    // Object.values(inputs).forEach(input => input.value = "");
                }
            });
        });
            </script>

    </body>
    </html>
